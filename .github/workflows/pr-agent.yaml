name: PR Reviewer Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    if: >
      github.event.sender.type != 'Bot' &&
      (
        github.event_name == 'pull_request' ||
        github.event.issue.pull_request != null
      )

    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:
      - name: Run PR Agent
        uses: the-pr-agent/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CUSTOM_LLM_PROVIDER: "gemini"
          
          # Configuration as proper env vars (no dots)
          CONFIG_MODEL: "gemini/gemini-1.5-flash"
          CONFIG_FALLBACK_MODELS: '["gemini/gemini-1.5-flash"]'
          
          # PR Agent specific configs
          GITHUB_ACTION_CONFIG_AUTO_REVIEW: "true"
          GITHUB_ACTION_CONFIG_AUTO_DESCRIBE: "true"
          GITHUB_ACTION_CONFIG_PR_COMMANDS: "true"